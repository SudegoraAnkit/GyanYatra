spring.application.name=gyanyatra_api

spring.config.import=optional:file:.env[.properties],optional:file:gyanyatra_api/.env[.properties]

# --- 1. MongoDB Configuration ---
# Ensure local MongoDB is running on port 27017
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/gyanyatra}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/gyanyatra}
spring.data.mongodb.auto-index-creation=true

# --- 2. RabbitMQ Configuration ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RabbitMQ Listener Settings
spring.rabbitmq.listener.simple.concurrency=5
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2s
spring.rabbitmq.listener.simple.retry.max-attempts=3

# --- 3. Spring AI Configuration (Google Gemini) ---
spring.ai.google.genai.api-key=${GOOGLE_GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.response-mime-type=application/json
spring.ai.google.genai.chat.options.temperature=0.7

# --- YouTube API Configuration ---
youtube.api.key=${YOUTUBE_API_KEY:}


# --- 4. Performance (Virtual Threads) ---
# Enables Java 21+ Virtual Threads for Tomcat and RabbitMQ listeners
spring.threads.virtual.enabled=true

# --- 5. Logging Levels ---
logging.level.root=INFO
logging.level.com.sudegoraankit.gyanyatra=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.ai=INFO

# --- 6. Server & API Configuration ---
server.port=8080
server.error.include-message=always

# --- 7. Email Configuration (SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- 8. Security & JWT Configuration ---
gyanyatra.jwt.secret=${GYANYATRA_JWT_SECRET:defaultSecretKeyKeepItSecureAndLongEnoughToAvoidSignatureExceptions}

# --- 9. CORS Configuration ---
gyanyatra.allowed-origins=${GYANYATRA_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- 10. Brevo Email API Configuration ---
gyanyatra.brevo.api-key=${BREVO_API_KEY:}
gyanyatra.brevo.sender-email=${BREVO_SENDER_EMAIL:gyanyatra.mail@gmail.com}







